<!doctype html><html lang="zh-Hant"><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>33 Facebook 廣告管理助手 · Alpha 載入器</title><style>body{margin:0;background:#0b1020;color:#dbeafe;font:14px system-ui}.wrap{padding:22px}code{color:#7dd3fc}</style><div class="wrap">正在載入 v2.0-alpha 面板…</div><script>(()=>{const ORIGIN='https://dw5000tw-33.github.io',BASE=ORIGIN+'/fbauto/alpha/',nonce=new URLSearchParams(location.search).get('nonce')||'',out=document.querySelector('.wrap'),say=t=>out.innerHTML=t;if(!window.opener){say('此頁必須由 Alpha Bookmarklet 開啟。');return}if(!nonce){say('缺少安全識別碼，已拒絕載入。');return}try{window.opener.postMessage({type:'FB_AD_ALPHA_READY',nonce},'*')}catch(e){say('無法與原頁面連線。');return}Promise.all(['panel-v2.0-alpha.js','facebook-style-v2.0-alpha.js','facebook-interaction-v2.0-alpha.js'].map(file=>fetch(BASE+file+'?v='+Date.now(),{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error(file+' HTTP '+r.status);return r.text()}))).then(parts=>{const code=parts.join('\n');window.opener.postMessage({type:'FB_AD_ALPHA_CODE',nonce,code},'*');say('面板已送回原頁面，視窗即將關閉…');setTimeout(()=>window.close(),500)}).catch(e=>{try{window.opener.postMessage({type:'FB_AD_ALPHA_ERROR',nonce,message:String(e.message||e)},'*')}catch{}say('載入失敗：<code>'+String(e.message||e)+'</code>')})})()</script></html>
