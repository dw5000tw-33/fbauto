<!doctype html><html lang="zh-Hant"><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>33 Facebook 廣告管理助手 · 通行碼驗證</title><style>body{margin:0;background:#0b1020;color:#dbeafe;font:14px system-ui}.wrap{padding:22px}</style><div class="wrap">正在安全驗證通行碼…</div><script>(()=>{const API='https://fb-ad-manager-api.onrender.com',nonce=new URLSearchParams(location.search).get('nonce')||'',out=document.querySelector('.wrap'),say=t=>out.textContent=t;let done=false;const reply=p=>{try{window.opener&&window.opener.postMessage({type:'FB_AD_ALPHA_VERIFY_RESULT',nonce,...p},'*')}catch{}};if(!window.opener||!nonce){say('此驗證頁面只能由 Alpha 面板開啟。');return}try{window.opener.postMessage({type:'FB_AD_ALPHA_VERIFY_READY',nonce},'*')}catch{say('無法與面板連線。');return}window.addEventListener('message',async e=>{if(done||!e.data||e.data.type!=='FB_AD_ALPHA_VERIFY_CODE'||e.data.nonce!==nonce)return;done=true;const code=String(e.data.code||'').trim();if(!code){reply({ok:false,reason:'CODE_REQUIRED'});say('沒有收到通行碼。');return}try{const r=await fetch(API+'/api/verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code})}),data=await r.json().catch(()=>({ok:false,reason:'INVALID_RESPONSE'}));reply({ok:r.ok&&data.ok===true,reason:data.reason||null,profile:data.ok?data.profile||null:null});say(data.ok?'驗證成功，正在回到面板…':'通行碼未通過驗證。');setTimeout(()=>window.close(),700)}catch(err){reply({ok:false,reason:'NETWORK_ERROR'});say('暫時無法連線驗證服務，請稍後再試。')}})})()</script></html>
